<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" role="img" aria-label="Ilustración de camión de flota pesada en servicio de mantenimiento profesional">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#071525"/>
      <stop offset="65%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#091520"/>
    </linearGradient>
    <linearGradient id="cabTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b6cc9"/>
      <stop offset="100%" stop-color="#1a4a8c"/>
    </linearGradient>
    <linearGradient id="cabFront" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a4a8c"/>
      <stop offset="100%" stop-color="#12336a"/>
    </linearGradient>
    <linearGradient id="trailer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c3d72"/>
      <stop offset="100%" stop-color="#102040"/>
    </linearGradient>
    <radialGradient id="tire" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </radialGradient>
    <radialGradient id="headlightGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#f5a623" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="groundGlow" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#1a4a8c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1a4a8c" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle background grid -->
  <g opacity="0.035" stroke="#ffffff" stroke-width="0.5">
    <line x1="100" y1="0" x2="100" y2="355"/>
    <line x1="200" y1="0" x2="200" y2="355"/>
    <line x1="300" y1="0" x2="300" y2="355"/>
    <line x1="400" y1="0" x2="400" y2="355"/>
    <line x1="500" y1="0" x2="500" y2="355"/>
    <line x1="600" y1="0" x2="600" y2="355"/>
    <line x1="700" y1="0" x2="700" y2="355"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
  </g>

  <!-- Horizon atmospheric glow -->
  <ellipse cx="400" cy="358" rx="520" ry="55" fill="url(#groundGlow)"/>

  <!-- Road -->
  <rect x="0" y="356" width="800" height="44" fill="#070f1a"/>
  <rect x="0" y="354" width="800" height="4" fill="#0c1a2e" opacity="0.9"/>
  <!-- Road center dashes -->
  <rect x="0"   y="374" width="90" height="3" fill="#162840" rx="1" opacity="0.6"/>
  <rect x="140" y="374" width="90" height="3" fill="#162840" rx="1" opacity="0.6"/>
  <rect x="280" y="374" width="90" height="3" fill="#162840" rx="1" opacity="0.6"/>
  <rect x="420" y="374" width="90" height="3" fill="#162840" rx="1" opacity="0.6"/>
  <rect x="560" y="374" width="90" height="3" fill="#162840" rx="1" opacity="0.6"/>
  <rect x="700" y="374" width="90" height="3" fill="#162840" rx="1" opacity="0.6"/>

  <!-- ===================== WHEELS ===================== -->

  <!-- Rear tandem axle 2 (cx=628) -->
  <circle cx="628" cy="322" r="40" fill="url(#tire)"/>
  <circle cx="628" cy="322" r="26" fill="#181818"/>
  <circle cx="628" cy="322" r="16" fill="#282828"/>
  <circle cx="628" cy="322" r="7"  fill="#383838"/>
  <!-- lug nuts -->
  <circle cx="628" cy="304" r="3" fill="#444"/>
  <circle cx="628" cy="340" r="3" fill="#444"/>
  <circle cx="610" cy="310" r="3" fill="#444"/>
  <circle cx="646" cy="310" r="3" fill="#444"/>
  <circle cx="610" cy="334" r="3" fill="#444"/>
  <circle cx="646" cy="334" r="3" fill="#444"/>

  <!-- Rear tandem axle 1 (cx=558) -->
  <circle cx="558" cy="322" r="40" fill="url(#tire)"/>
  <circle cx="558" cy="322" r="26" fill="#181818"/>
  <circle cx="558" cy="322" r="16" fill="#282828"/>
  <circle cx="558" cy="322" r="7"  fill="#383838"/>
  <circle cx="558" cy="304" r="3" fill="#444"/>
  <circle cx="558" cy="340" r="3" fill="#444"/>
  <circle cx="540" cy="310" r="3" fill="#444"/>
  <circle cx="576" cy="310" r="3" fill="#444"/>
  <circle cx="540" cy="334" r="3" fill="#444"/>
  <circle cx="576" cy="334" r="3" fill="#444"/>

  <!-- Front axle (cx=150) -->
  <circle cx="150" cy="322" r="40" fill="url(#tire)"/>
  <circle cx="150" cy="322" r="26" fill="#181818"/>
  <circle cx="150" cy="322" r="16" fill="#282828"/>
  <circle cx="150" cy="322" r="7"  fill="#383838"/>
  <circle cx="150" cy="304" r="3" fill="#444"/>
  <circle cx="150" cy="340" r="3" fill="#444"/>
  <circle cx="132" cy="310" r="3" fill="#444"/>
  <circle cx="168" cy="310" r="3" fill="#444"/>
  <circle cx="132" cy="334" r="3" fill="#444"/>
  <circle cx="168" cy="334" r="3" fill="#444"/>

  <!-- ===================== CHASSIS FRAME ===================== -->
  <rect x="112" y="296" width="618" height="10" fill="#0e1d35" rx="1"/>
  <rect x="112" y="299" width="618" height="4" fill="#09152a"/>

  <!-- ===================== TRAILER BODY ===================== -->
  <rect x="292" y="170" width="452" height="130" fill="url(#trailer)" rx="2"/>
  <!-- Top edge highlight -->
  <rect x="292" y="170" width="452" height="5" fill="#2255a0" rx="2" opacity="0.7"/>
  <!-- Horizontal ribs -->
  <g stroke="#172e58" stroke-width="1" opacity="0.8">
    <line x1="294" y1="190" x2="742" y2="190"/>
    <line x1="294" y1="210" x2="742" y2="210"/>
    <line x1="294" y1="230" x2="742" y2="230"/>
    <line x1="294" y1="250" x2="742" y2="250"/>
    <line x1="294" y1="270" x2="742" y2="270"/>
    <line x1="294" y1="290" x2="742" y2="290"/>
  </g>
  <!-- Trailer rear face -->
  <rect x="720" y="173" width="26" height="124" fill="#0b1828" rx="1"/>
  <line x1="733" y1="176" x2="733" y2="294" stroke="#162840" stroke-width="1"/>
  <!-- Rear door handle -->
  <rect x="716" y="225" width="6" height="45" fill="#152840" rx="2"/>
  <!-- Amber accent stripe along trailer bottom -->
  <rect x="292" y="293" width="452" height="5" fill="#f5a623" opacity="0.8"/>
  <!-- Subtle brand panel on trailer -->
  <rect x="360" y="205" width="270" height="70" fill="#091525" rx="3" opacity="0.45"/>
  <!-- Corner reflectors -->
  <rect x="292" y="173" width="8" height="8" fill="#f5a623" rx="1" opacity="0.7"/>
  <rect x="736" y="173" width="8" height="8" fill="#f5a623" rx="1" opacity="0.7"/>

  <!-- ===================== FUEL TANK ===================== -->
  <rect x="296" y="272" width="40" height="56" fill="#101e38" rx="3"/>
  <rect x="299" y="274" width="34" height="52" fill="#0c1830" rx="2"/>
  <rect x="299" y="274" width="34" height="6"  fill="#18306a" rx="2" opacity="0.8"/>

  <!-- ===================== CAB (cab-over style) ===================== -->

  <!-- Roof fairing / aerodynamic spoiler -->
  <path d="M92 158 Q200 128 288 142 L288 170 L92 170 Z" fill="#1e4a8c"/>
  <path d="M96 158 Q200 132 285 145 L285 162 L96 162 Z" fill="#2460a8" opacity="0.7"/>

  <!-- Cab main body (side) -->
  <rect x="88" y="170" width="200" height="132" fill="url(#cabTop)" rx="2"/>

  <!-- Cab front vertical face -->
  <rect x="72" y="210" width="20" height="122" fill="url(#cabFront)" rx="1"/>

  <!-- Windshield -->
  <path d="M90 173 Q93 163 108 157 L270 157 Q282 161 286 173 L286 215 L90 215 Z" fill="#6bbfe0" opacity="0.78"/>
  <!-- A-pillars -->
  <rect x="90"  y="162" width="12" height="53" fill="#164080" rx="1"/>
  <rect x="276" y="162" width="12" height="53" fill="#164080" rx="1"/>
  <!-- Windshield glare -->
  <path d="M108 162 L240 162 L240 182 L108 182 Z" fill="#ffffff" opacity="0.06" rx="2"/>
  <!-- Wiper resting position -->
  <line x1="130" y1="212" x2="240" y2="212" stroke="#0e2040" stroke-width="2" opacity="0.6"/>

  <!-- Side window (small vent quarter window) -->
  <rect x="90" y="222" width="28" height="32" fill="#5ab0d5" opacity="0.65" rx="2"/>
  <!-- Main side window / door glass -->
  <rect x="122" y="222" width="130" height="60" fill="#5ab0d5" opacity="0.6" rx="2"/>
  <!-- Window top chrome trim -->
  <rect x="90" y="220" width="162" height="3" fill="#2255a0" rx="1" opacity="0.8"/>

  <!-- Cab door panel lower -->
  <rect x="90"  y="284" width="160" height="18" fill="#164888" rx="1" opacity="0.6"/>
  <!-- Door handle -->
  <rect x="220" y="254" width="18" height="5" fill="#4a8ad4" rx="2"/>

  <!-- Step boards -->
  <rect x="100" y="302" width="75" height="5" fill="#0a1828" rx="1"/>
  <rect x="100" y="311" width="75" height="5" fill="#0a1828" rx="1"/>

  <!-- Grille -->
  <rect x="72" y="248" width="19" height="60" fill="#0e1e38" rx="1"/>
  <g stroke="#1a3560" stroke-width="1.5">
    <line x1="73" y1="257" x2="90" y2="257"/>
    <line x1="73" y1="265" x2="90" y2="265"/>
    <line x1="73" y1="273" x2="90" y2="273"/>
    <line x1="73" y1="281" x2="90" y2="281"/>
    <line x1="73" y1="289" x2="90" y2="289"/>
    <line x1="73" y1="297" x2="90" y2="297"/>
  </g>
  <!-- Grille center bar -->
  <rect x="80" y="248" width="2" height="60" fill="#162d52" opacity="0.8"/>

  <!-- Bumper -->
  <rect x="60" y="305" width="28" height="20" fill="#112040" rx="2"/>
  <rect x="58" y="315" width="32" height="8"  fill="#0c1830" rx="1"/>

  <!-- HEADLIGHTS -->
  <!-- Glow (behind headlight housing) -->
  <circle cx="76" cy="238" r="38" fill="url(#headlightGlow)" filter="url(#softBlur)"/>
  <!-- DRL strip -->
  <rect x="72" y="226" width="16" height="5" fill="#f5a623" rx="2" opacity="0.95"/>
  <!-- Headlight housing -->
  <rect x="72" y="233" width="16" height="22" fill="#122040" rx="2"/>
  <!-- Lens -->
  <ellipse cx="80" cy="244" rx="6" ry="9" fill="#ffcc44" opacity="0.92"/>
  <ellipse cx="80" cy="242" rx="4" ry="6" fill="#ffe080" opacity="0.7"/>
  <!-- Fog light -->
  <ellipse cx="80" cy="300" rx="7" ry="4" fill="#f5a623" opacity="0.6"/>

  <!-- Side marker lights -->
  <circle cx="90"  cy="310" r="5" fill="#f5a623" opacity="0.8"/>
  <circle cx="740" cy="175" r="4" fill="#f5a623" opacity="0.7"/>
  <circle cx="740" cy="298" r="4" fill="#e03030" opacity="0.8"/>

  <!-- ===================== EXHAUST STACKS ===================== -->
  <rect x="278" y="78"  width="9" height="94" fill="#1c3c6c" rx="4"/>
  <rect x="274" y="74"  width="17" height="12" fill="#243c6a" rx="3"/>
  <rect x="292" y="82"  width="9" height="90" fill="#1c3c6c" rx="4"/>
  <rect x="288" y="78"  width="17" height="12" fill="#243c6a" rx="3"/>
  <!-- Exhaust wisps -->
  <path d="M283 74 Q289 56 284 40 Q280 26 285 12" stroke="#1e3860" stroke-width="3" fill="none" opacity="0.45" stroke-linecap="round"/>
  <path d="M296 79 Q302 62 297 46" stroke="#1e3860" stroke-width="2.5" fill="none" opacity="0.3" stroke-linecap="round"/>

  <!-- Fifth wheel coupling -->
  <rect x="285" y="292" width="28" height="7" fill="#0e1c35" rx="2"/>

  <!-- ===================== DIAGNOSTIC HUD ===================== -->
  <rect x="590" y="18" width="192" height="108" fill="#060f1e" rx="6" opacity="0.94"/>
  <rect x="592" y="20" width="188" height="104" fill="none" stroke="#1a3560" stroke-width="1" rx="5"/>
  <!-- HUD title bar -->
  <rect x="592" y="20" width="188" height="24" fill="#0a1929" rx="5"/>
  <rect x="592" y="38" width="188" height="6" fill="#0a1929"/>
  <!-- Status dot -->
  <circle cx="606" cy="32" r="5" fill="#f5a623"/>
  <circle cx="606" cy="32" r="3" fill="#ffc840"/>
  <text x="618" y="36" font-family="'Courier New', monospace" font-size="9" fill="#4a9fd4" letter-spacing="1.2">DIAGNÓSTICO EN VIVO</text>
  <!-- Row 1: Motor -->
  <circle cx="606" cy="56" r="4" fill="#22c55e"/>
  <text x="616" y="60" font-family="'Courier New', monospace" font-size="9" fill="#8ab8d4">Motor</text>
  <rect x="653" y="51" width="56" height="9" fill="#091525" rx="3"/>
  <rect x="653" y="51" width="50" height="9" fill="#22c55e" rx="3" opacity="0.75"/>
  <text x="713" y="59" font-family="'Courier New', monospace" font-size="8" fill="#22c55e">OK</text>
  <!-- Row 2: Frenos -->
  <circle cx="606" cy="76" r="4" fill="#f5a623"/>
  <text x="616" y="80" font-family="'Courier New', monospace" font-size="9" fill="#8ab8d4">Frenos</text>
  <rect x="653" y="71" width="56" height="9" fill="#091525" rx="3"/>
  <rect x="653" y="71" width="36" height="9" fill="#f5a623" rx="3" opacity="0.75"/>
  <text x="713" y="79" font-family="'Courier New', monospace" font-size="8" fill="#f5a623">60%</text>
  <!-- Row 3: Transmisión -->
  <circle cx="606" cy="96" r="4" fill="#22c55e"/>
  <text x="616" y="100" font-family="'Courier New', monospace" font-size="9" fill="#8ab8d4">Transmisión</text>
  <rect x="678" y="91" width="56" height="9" fill="#091525" rx="3"/>
  <rect x="678" y="91" width="52" height="9" fill="#22c55e" rx="3" opacity="0.75"/>
  <text x="738" y="99" font-family="'Courier New', monospace" font-size="8" fill="#22c55e">OK</text>

  <!-- ===================== AMBIENT / PARTICLES ===================== -->
  <ellipse cx="400" cy="360" rx="380" ry="14" fill="#1a4a8c" opacity="0.1"/>
  <circle cx="42"  cy="48"  r="1.5" fill="#4a9fd4" opacity="0.35"/>
  <circle cx="520" cy="62"  r="1.5" fill="#4a9fd4" opacity="0.2"/>
  <circle cx="775" cy="95"  r="2"   fill="#4a9fd4" opacity="0.2"/>
  <circle cx="415" cy="118" r="1"   fill="#f5a623" opacity="0.3"/>
  <circle cx="55"  cy="148" r="1"   fill="#4a9fd4" opacity="0.2"/>
  <circle cx="340" cy="38"  r="1"   fill="#4a9fd4" opacity="0.2"/>
</svg>
