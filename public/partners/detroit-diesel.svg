<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 60" width="140" height="60" role="img" aria-label="Detroit Diesel">
  <rect width="140" height="60" fill="#ffffff" rx="4"/>
  <!-- Círculo centrado en cy=30 -->
  <circle cx="20" cy="30" r="14" fill="#003087"/>
  <text x="20" y="30" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="11" fill="#ffffff">DD</text>
  <!-- Dos líneas centradas como bloque en y=30: línea1 y=22, línea2 y=38 -->
  <text x="40" y="22" dominant-baseline="middle" font-family="Arial, sans-serif" font-weight="700" font-size="12" letter-spacing="0.8" fill="#003087">DETROIT</text>
  <text x="40" y="38" dominant-baseline="middle" font-family="Arial, sans-serif" font-weight="700" font-size="12" letter-spacing="0.8" fill="#003087">DIESEL</text>
</svg>
